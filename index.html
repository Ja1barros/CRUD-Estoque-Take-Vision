<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Take Vision Imagem</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{display:none;min-height:100vh}
.auth{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.auth-card{background:#fff;border-radius:16px;border:0.5px solid #e0e0d8;padding:2rem;width:100%;max-width:400px}
.auth-title{font-size:22px;font-weight:500;margin-bottom:6px}
.auth-sub{font-size:14px;color:#666;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:#666;margin-bottom:4px}
input,select{width:100%;border:0.5px solid #d0d0c8;border-radius:8px;padding:8px 12px;font-size:14px;background:#fff;color:#1a1a1a;outline:none}
input:focus,select:focus{border-color:#888}
.btn{width:100%;border:0.5px solid #d0d0c8;border-radius:8px;padding:9px 18px;font-size:14px;background:#1a1a1a;color:#fff;cursor:pointer;font-weight:500;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-outline{background:transparent;color:#1a1a1a}
.btn-sm{width:auto;padding:5px 14px;font-size:13px}
.btn-danger{background:#e24b4a;border-color:#e24b4a;color:#fff}
.btn-blue{background:#185fa5;border-color:#185fa5;color:#fff}
.btn-edit{background:#f5a623;border-color:#f5a623;color:#fff}
.err{background:#fcebeb;color:#a32d2d;border:0.5px solid #f09595;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:12px}
.ok{background:#eaf3de;color:#3b6d11;border:0.5px solid #97c459;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:12px}
header{background:#fff;border-bottom:0.5px solid #e0e0d8;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px}
.header-title{font-size:16px;font-weight:500}
.header-user{font-size:13px;color:#666;display:flex;align-items:center;gap:12px}
.tabs{display:flex;border-bottom:0.5px solid #e0e0d8;background:#fff;padding:0 1.5rem;overflow-x:auto}
.tab{padding:12px 18px;font-size:14px;border:none;background:none;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:400;white-space:nowrap}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.content{padding:1.5rem;max-width:900px;margin:0 auto}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.metric{background:#fff;border:0.5px solid #e0e0d8;border-radius:10px;padding:1rem}
.metric-label{font-size:12px;color:#888;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500}
.card{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px}
.card-dashed{border-style:dashed;margin-top:16px}
.row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.col{flex:1;min-width:140px}
.badge{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500}
.badge-ok{background:#eaf3de;color:#3b6d11}
.badge-warn{background:#faeeda;color:#854f0b}
.badge-info{background:#e6f1fb;color:#185fa5}
.badge-gray{background:#f1efe8;color:#5f5e5a}
.admin-badge{background:#534ab7;color:#eeedfe;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
.progress-wrap{background:#f1efe8;border-radius:4px;height:6px;overflow:hidden;margin-top:10px}
.progress-bar{height:100%;border-radius:4px;transition:width .3s}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{border:0.5px solid #d0d0c8;border-radius:8px;padding:5px 12px;font-size:12px;background:transparent;cursor:pointer}
.filter-btn.active{background:#f1efe8}
.section-title{font-size:16px;font-weight:500;margin-bottom:14px}
.section-sub{font-size:13px;font-weight:500;color:#555;margin:16px 0 10px;padding-bottom:6px;border-bottom:0.5px solid #e0e0d8}
.empty{color:#888;font-size:14px;padding:2rem 0;text-align:center}
.tag-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.tag-item{display:flex;align-items:center;gap:6px;background:#f1efe8;border-radius:8px;padding:5px 10px;font-size:13px}
.tag-x{background:none;border:none;color:#a32d2d;cursor:pointer;font-size:15px;line-height:1}
.item-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.item-name{font-weight:500;font-size:15px}
.item-sub{font-size:12px;color:#888;margin-top:2px}
.actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.check-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;margin-bottom:10px}
.check-item{display:flex;align-items:center;gap:8px;font-size:14px}
.check-item input[type=checkbox]{width:auto}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;margin:1rem}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.modal-title{font-size:17px;font-weight:500}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#888}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}.row{flex-direction:column}}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth" id="authScreen">
  <div class="auth-card">
    <div class="auth-title">Take Vision Imagem</div>
    <div class="auth-sub" id="authSub">Entre com sua conta</div>
    <div id="authMsg"></div>
    <div class="field" id="nomeField" style="display:none"><label>Nome</label><input type="text" id="nomeInput" placeholder="Seu nome"/></div>
    <div class="field"><label>E-mail</label><input type="email" id="emailInput" placeholder="seu@email.com"/></div>
    <div class="field"><label>Senha</label><input type="password" id="senhaInput" placeholder="••••••••"/></div>
    <button class="btn" id="authBtn" onclick="handleAuth()">Entrar</button>
    <div style="text-align:center;margin-top:14px">
      <button onclick="toggleAuthMode()" style="background:none;border:none;color:#888;font-size:13px;cursor:pointer" id="toggleBtn">Não tem conta? Cadastre-se</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appScreen">
  <header>
    <div class="header-title">Take Vision Imagem</div>
    <div class="header-user">
      <span id="userNome"></span><span id="userPapel"></span>
      <button class="btn btn-outline btn-sm" onclick="sair()">Sair</button>
    </div>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="mudarTab('estoque',this)">Estoque</button>
    <button class="tab" onclick="mudarTab('gerenciar',this)">Gerenciar</button>
    <button class="tab" onclick="mudarTab('projetos',this)">Projetos</button>
    <button class="tab" onclick="mudarTab('freelancers',this)">Freelancers</button>
    <button class="tab" onclick="mudarTab('movimentar',this)">Movimentar</button>
    <button class="tab" onclick="mudarTab('historico',this)">Histórico</button>
    <button class="tab" id="tabAdmin" style="display:none" onclick="mudarTab('admin',this)">Usuários</button>
  </div>
  <div class="content">
    <div id="appMsg"></div>

    <!-- ESTOQUE -->
    <div id="tab-estoque">
      <div class="metrics" id="metricsArea"></div>
      <div class="filters" id="filtrosArea"></div>
      <div id="listaEquipamentos"></div>
    </div>

    <!-- GERENCIAR -->
    <div id="tab-gerenciar" style="display:none">
      <div class="section-sub">Equipamentos</div>
      <div id="gerenciarEquipamentos"></div>
      <div class="card card-dashed">
        <div class="section-title">Adicionar equipamento</div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Nome</label><input id="eqNome" placeholder="Ex: Canon R5"/></div>
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Categoria</label><select id="eqCat"></select></div>
          <div style="width:90px"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Qtd</label><input id="eqQtd" type="number" min="1" value="1"/></div>
        </div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Nº de série</label><input id="eqSerie" placeholder="Opcional"/></div>
          <div style="display:flex;align-items:flex-end"><button class="btn btn-sm btn-outline" onclick="cadastrarEq()">+ Adicionar</button></div>
        </div>
      </div>

      <div class="section-sub">Categorias</div>
      <div class="tag-list" id="listaCategorias"></div>
      <div class="card card-dashed">
        <div class="section-title">Adicionar categoria</div>
        <div class="row">
          <div class="col"><input id="catNome" placeholder="Ex: Drones"/></div>
          <div style="display:flex;align-items:center"><button class="btn btn-sm btn-outline" onclick="criarCategoria()">+ Adicionar</button></div>
        </div>
      </div>
    </div>

    <!-- PROJETOS -->
    <div id="tab-projetos" style="display:none">
      <div id="listaProjetos"></div>
      <div class="card card-dashed">
        <div class="section-title">Criar projeto</div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Nome</label><input id="projNome" placeholder="Ex: Clip Musical Março"/></div>
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Data</label><input id="projData" type="date"/></div>
        </div>
        <button class="btn btn-sm btn-outline" onclick="criarProjeto()">+ Criar projeto</button>
      </div>
    </div>

    <!-- FREELANCERS -->
    <div id="tab-freelancers" style="display:none">
      <div class="section-sub">Freelancers</div>
      <div id="listaFreelancers"></div>
      <div class="card card-dashed">
        <div class="section-title">Cadastrar freelancer</div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Nome</label><input id="flNome" placeholder="Ex: João Silva"/></div>
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Função</label><select id="flFuncao"></select></div>
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Telefone</label><input id="flTel" placeholder="(21) 99999-9999"/></div>
        </div>
        <button class="btn btn-sm btn-outline" onclick="cadastrarFreelancer()">+ Cadastrar</button>
      </div>

      <div class="section-sub">Funções</div>
      <div class="tag-list" id="listaFuncoes"></div>
      <div class="card card-dashed">
        <div class="section-title">Adicionar função</div>
        <div class="row">
          <div class="col"><input id="funcaoNome" placeholder="Ex: Cinegrafista"/></div>
          <div style="display:flex;align-items:center"><button class="btn btn-sm btn-outline" onclick="criarFuncao()">+ Adicionar</button></div>
        </div>
      </div>
    </div>

    <!-- MOVIMENTAR -->
    <div id="tab-movimentar" style="display:none">
      <div class="card">
        <div class="section-title">Registrar movimentação</div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Tipo</label>
            <select id="movTipo"><option value="saída">Saída (retirada)</option><option value="entrada">Entrada (devolução)</option></select></div>
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Equipamento</label><select id="movEq"><option value="">Selecione...</option></select></div>
        </div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Projeto</label><select id="movProj"><option value="">Selecione...</option></select></div>
          <div style="width:90px"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Qtd</label><input id="movQtd" type="number" min="1" value="1"/></div>
        </div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Responsável</label><input id="movResp" placeholder="Nome"/></div>
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Data</label><input id="movData" type="date"/></div>
        </div>
        <button class="btn btn-sm btn-outline" onclick="registrarMov()">Registrar movimentação</button>
      </div>
    </div>

    <!-- HISTÓRICO -->
    <div id="tab-historico" style="display:none"><div id="listaHistorico"></div></div>

    <!-- ADMIN -->
    <div id="tab-admin" style="display:none"><div id="listaUsuarios"></div></div>
  </div>
</div>

<!-- MODAL PROJETO -->
<div class="modal-bg" id="modalProj">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalProjTitulo"></div>
      <button class="modal-close" onclick="fecharModal('modalProj')">×</button>
    </div>
    <div id="modalProjConteudo"></div>
    <div style="display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap">
      <button class="btn btn-sm btn-blue" onclick="gerarPDF()">⬇ Baixar PDF</button>
      <button class="btn btn-sm btn-outline" onclick="fecharModal('modalProj')">Fechar</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR EQUIPAMENTO -->
<div class="modal-bg" id="modalEq">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Editar equipamento</div>
      <button class="modal-close" onclick="fecharModal('modalEq')">×</button>
    </div>
    <div class="field"><label>Nome</label><input id="editEqNome"/></div>
    <div class="field"><label>Categoria</label><select id="editEqCat"></select></div>
    <div class="field"><label>Qtd total</label><input id="editEqQtd" type="number" min="1"/></div>
    <div class="field"><label>Nº de série</label><input id="editEqSerie"/></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-sm btn-outline" onclick="salvarEq()">Salvar</button>
      <button class="btn btn-sm btn-outline" onclick="fecharModal('modalEq')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR CATEGORIA -->
<div class="modal-bg" id="modalCat">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Editar categoria</div>
      <button class="modal-close" onclick="fecharModal('modalCat')">×</button>
    </div>
    <div class="field"><label>Nome</label><input id="editCatNome"/></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-sm btn-outline" onclick="salvarCategoria()">Salvar</button>
      <button class="btn btn-sm btn-outline" onclick="fecharModal('modalCat')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR FREELANCER -->
<div class="modal-bg" id="modalFl">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Editar freelancer</div>
      <button class="modal-close" onclick="fecharModal('modalFl')">×</button>
    </div>
    <div class="field"><label>Nome</label><input id="editFlNome"/></div>
    <div class="field"><label>Função</label><select id="editFlFuncao"></select></div>
    <div class="field"><label>Telefone</label><input id="editFlTel"/></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-sm btn-outline" onclick="salvarFreelancer()">Salvar</button>
      <button class="btn btn-sm btn-outline" onclick="fecharModal('modalFl')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR FUNÇÃO -->
<div class="modal-bg" id="modalFuncao">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Editar função</div>
      <button class="modal-close" onclick="fecharModal('modalFuncao')">×</button>
    </div>
    <div class="field"><label>Nome</label><input id="editFuncaoNome"/></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-sm btn-outline" onclick="salvarFuncao()">Salvar</button>
      <button class="btn btn-sm btn-outline" onclick="fecharModal('modalFuncao')">Cancelar</button>
    </div>
  </div>
</div>

<script>
const SUPA_URL="https://wikmeymvknuujbnwmfjx.supabase.co";
const SUPA_KEY="sb_publishable_5aUMGeFFGjEh5lQWpUDBRA_YtfDyy7T";
const {createClient}=supabase;
const sb=createClient(SUPA_URL,SUPA_KEY);

let usuario=null,perfil=null,equipamentos=[],projetos=[],categorias=[],freelancers=[],funcoes=[],filtroAtivo="Todas",modalProjAtual=null;
let editEqId=null,editCatId=null,editFlId=null,editFuncaoId=null;

// ── AUTH ──────────────────────────────────────────────
let modoLogin=true;
function toggleAuthMode(){
  modoLogin=!modoLogin;
  document.getElementById("authSub").textContent=modoLogin?"Entre com sua conta":"Crie sua conta";
  document.getElementById("toggleBtn").textContent=modoLogin?"Não tem conta? Cadastre-se":"Já tem conta? Entrar";
  document.getElementById("nomeField").style.display=modoLogin?"none":"block";
}
async function handleAuth(){
  const email=document.getElementById("emailInput").value.trim();
  const senha=document.getElementById("senhaInput").value;
  const nome=document.getElementById("nomeInput").value.trim();
  const msg=document.getElementById("authMsg");
  const btn=document.getElementById("authBtn");
  msg.innerHTML="";
  if(!email||!senha){msg.innerHTML='<div class="err">Preencha e-mail e senha.</div>';return;}
  btn.disabled=true;btn.textContent="Aguarde...";
  try {
    if(modoLogin){
      const {data,error}=await sb.auth.signInWithPassword({email,password:senha});
      if(error){msg.innerHTML=`<div class="err">Erro: ${error.message}</div>`;}
      else if(!data.session){msg.innerHTML='<div class="err">Login falhou. Verifique se o e-mail foi confirmado ou tente novamente.</div>';}
    } else {
      if(!nome){msg.innerHTML='<div class="err">Informe seu nome.</div>';return;}
      const {data,error}=await sb.auth.signUp({email,password:senha});
      if(error){msg.innerHTML=`<div class="err">${error.message}</div>`;return;}
      if(data.user){
        await sb.from("perfis").update({nome}).eq("id",data.user.id);
        if(data.session){msg.innerHTML='<div class="ok">Conta criada com sucesso!</div>';}
        else{msg.innerHTML='<div class="ok">Conta criada! Verifique seu e-mail para confirmar antes de entrar.</div>';}
      }
    }
  } catch(e){
    msg.innerHTML=`<div class="err">Erro inesperado. Tente novamente.</div>`;
  } finally {
    btn.disabled=false;btn.textContent=modoLogin?"Entrar":"Cadastrar";
  }
}
async function sair(){await sb.auth.signOut();location.reload();}

sb.auth.onAuthStateChange(async(event,session)=>{
  if(session?.user){
    usuario=session.user;
    const {data}=await sb.from("perfis").select("*").eq("id",usuario.id).single();
    perfil=data;
    document.getElementById("authScreen").style.display="none";
    document.getElementById("appScreen").style.display="block";
    document.getElementById("userNome").textContent=perfil?.nome||usuario.email;
    if(perfil?.papel==="admin"){
      document.getElementById("userPapel").innerHTML='<span class="admin-badge">Admin</span>';
      document.getElementById("tabAdmin").style.display="inline-block";
    }
    document.getElementById("movData").value=new Date().toISOString().split("T")[0];
    document.getElementById("projData").value=new Date().toISOString().split("T")[0];
    await carregarTudo();
  }
});

// ── CARREGAR ──────────────────────────────────────────
async function carregarTudo(){
  await Promise.all([carregarEquipamentos(),carregarProjetos(),carregarCategorias(),carregarFreelancers(),carregarFuncoes()]);
  renderMetrics();renderEquipamentos();renderGerenciarEquipamentos();renderProjetos();renderFreelancers();renderHistorico();
  preencherSelects();
  if(perfil?.papel==="admin")carregarUsuarios();
}
async function carregarEquipamentos(){const {data}=await sb.from("equipamentos").select("*").order("id");equipamentos=data||[];}
async function carregarProjetos(){const {data}=await sb.from("projetos").select("*").order("id");projetos=data||[];}
async function carregarCategorias(){const {data}=await sb.from("categorias").select("*").order("nome");categorias=data||[];renderCategorias();}
async function carregarFreelancers(){const {data}=await sb.from("freelancers").select("*").order("nome");freelancers=data||[];}
async function carregarFuncoes(){const {data}=await sb.from("funcoes").select("*").order("nome");funcoes=data||[];renderFuncoes();}

// ── MODAIS ────────────────────────────────────────────
function abrirModal(id){document.getElementById(id).style.display="flex";}
function fecharModal(id){document.getElementById(id).style.display="none";}

// ── CATEGORIAS ────────────────────────────────────────
function renderCategorias(){
  const sel=document.getElementById("eqCat");
  if(sel)sel.innerHTML=categorias.map(c=>`<option value="${c.nome}">${c.nome}</option>`).join("");
  const sel2=document.getElementById("editEqCat");
  if(sel2)sel2.innerHTML=categorias.map(c=>`<option value="${c.nome}">${c.nome}</option>`).join("");
  const lista=document.getElementById("listaCategorias");
  if(lista)lista.innerHTML=categorias.map(c=>`
    <div class="tag-item">${c.nome}
      <button class="tag-x" style="color:#185fa5;font-size:13px;padding:0 2px" onclick="abrirEditarCategoria(${c.id},'${c.nome.replace(/'/g,"\\'")}')">✏</button>

// ── MODAL PROJETO ─────────────────────────────────────
async function abrirModalProjeto(projId){
  const proj=projetos.find(p=>p.id===projId);
  modalProjAtual=proj;
  document.getElementById("modalProjTitulo").textContent=proj.nome;
  const {data:links}=await sb.from("projeto_freelancers").select("freelancer_id").eq("projeto_id",projId);
  const vinculados=new Set((links||[]).map(l=>l.freelancer_id));
  const {data:movs}=await sb.from("movimentacoes").select("equipamento_id,quantidade,tipo").eq("projeto_id",projId);
  const alocMap={};
  (movs||[]).forEach(m=>{
    if(!alocMap[m.equipamento_id])alocMap[m.equipamento_id]=0;
    alocMap[m.equipamento_id]+=(m.tipo==="saída"?m.quantidade:-m.quantidade);
  });
  const eqsAloc=Object.entries(alocMap).filter(([,q])=>q>0).map(([id,q])=>({eq:equipamentos.find(e=>e.id===parseInt(id)),qtd:q})).filter(x=>x.eq);
  const dt=proj.data_projeto?new Date(proj.data_projeto+"T12:00:00").toLocaleDateString("pt-BR"):"Não definida";
  document.getElementById("modalProjConteudo").innerHTML=`
    <div style="font-size:13px;color:#888;margin-bottom:1rem">Data: <strong style="color:#1a1a1a">${dt}</strong> · Status: <strong>${proj.status}</strong></div>
    <div style="font-weight:500;margin-bottom:8px">Equipe (Freelancers)</div>
    <div class="check-list">
      ${freelancers.map(f=>`<label class="check-item">
        <input type="checkbox" ${vinculados.has(f.id)?"checked":""} onchange="toggleFreelancer(${projId},${f.id},this.checked)"/>
        <span>${f.nome} <span style="color:#888;font-size:12px">· ${f.funcao} · ${f.telefone||"—"}</span></span>
      </label>`).join("")||"<span style='color:#888;font-size:13px'>Nenhum freelancer cadastrado.</span>"}
    </div>
    <div style="font-weight:500;margin:1rem 0 8px">Equipamentos alocados</div>
    ${eqsAloc.length?eqsAloc.map(({eq,qtd})=>`<div style="font-size:14px;padding:4px 0;border-bottom:0.5px solid #f1efe8">${eq.nome} <span style="color:#888">× ${qtd}</span></div>`).join(""):"<div style='color:#888;font-size:13px'>Nenhum equipamento alocado.</div>"}`;
  abrirModal("modalProj");
}
async function toggleFreelancer(projId,flId,checked){
  if(checked){await sb.from("projeto_freelancers").upsert({projeto_id:projId,freelancer_id:flId});}
  else{await sb.from("projeto_freelancers").delete().eq("projeto_id",projId).eq("freelancer_id",flId);}
}

// ── PDF ───────────────────────────────────────────────
async function gerarPDF(){
  if(!modalProjAtual)return;
  const proj=modalProjAtual;
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const dt=proj.data_projeto?new Date(proj.data_projeto+"T12:00:00").toLocaleDateString("pt-BR"):"Não definida";
  let y=20;
  doc.setFontSize(18);doc.setFont("helvetica","bold");doc.text("Take Vision Imagem",14,y);y+=8;
  doc.setFontSize(12);doc.setFont("helvetica","normal");doc.setTextColor(100);doc.text("Relatório de Projeto",14,y);y+=10;
  doc.setDrawColor(200);doc.line(14,y,196,y);y+=8;
  doc.setTextColor(0);doc.setFontSize(14);doc.setFont("helvetica","bold");doc.text(proj.nome,14,y);y+=7;
  doc.setFontSize(11);doc.setFont("helvetica","normal");doc.setTextColor(80);doc.text(`Data: ${dt}    Status: ${proj.status}`,14,y);y+=12;
  const {data:links}=await sb.from("projeto_freelancers").select("freelancer_id").eq("projeto_id",proj.id);
  const vinculados=(links||[]).map(l=>freelancers.find(f=>f.id===l.freelancer_id)).filter(Boolean);
  doc.setTextColor(0);doc.setFontSize(13);doc.setFont("helvetica","bold");doc.text("Equipe (Freelancers)",14,y);y+=6;
  doc.setDrawColor(220);doc.line(14,y,196,y);y+=6;
  if(vinculados.length){
    vinculados.forEach(f=>{
      doc.setFontSize(11);doc.setFont("helvetica","normal");doc.setTextColor(0);doc.text(f.nome,16,y);
      doc.setTextColor(120);doc.text(`${f.funcao}   ${f.telefone||""}`,80,y);y+=7;
      if(y>270){doc.addPage();y=20;}
    });
  } else {doc.setFontSize(11);doc.setTextColor(150);doc.text("Nenhum freelancer vinculado.",16,y);y+=7;}
  y+=6;
  const {data:movs}=await sb.from("movimentacoes").select("equipamento_id,quantidade,tipo").eq("projeto_id",proj.id);
  const alocMap={};
  (movs||[]).forEach(m=>{
    if(!alocMap[m.equipamento_id])alocMap[m.equipamento_id]=0;
    alocMap[m.equipamento_id]+=(m.tipo==="saída"?m.quantidade:-m.quantidade);
  });
  const eqsAloc=Object.entries(alocMap).filter(([,q])=>q>0).map(([id,q])=>({eq:equipamentos.find(e=>e.id===parseInt(id)),qtd:q})).filter(x=>x.eq);
  doc.setTextColor(0);doc.setFontSize(13);doc.setFont("helvetica","bold");doc.text("Equipamentos Alocados",14,y);y+=6;
  doc.setDrawColor(220);doc.line(14,y,196,y);y+=6;
  if(eqsAloc.length){
    eqsAloc.forEach(({eq,qtd})=>{
      doc.setFontSize(11);doc.setFont("helvetica","normal");doc.setTextColor(0);doc.text(eq.nome,16,y);
      doc.setTextColor(120);doc.text(`${eq.categoria}   × ${qtd}`,100,y);y+=7;
      if(y>270){doc.addPage();y=20;}
    });
  } else {doc.setFontSize(11);doc.setTextColor(150);doc.text("Nenhum equipamento alocado.",16,y);y+=7;}
  y+=6;doc.setFontSize(9);doc.setTextColor(180);doc.text(`Gerado em ${new Date().toLocaleString("pt-BR")}`,14,y);
  doc.save(`${proj.nome.replace(/\s+/g,"-")}.pdf`);
}

function preencherSelects(){
  document.getElementById("movEq").innerHTML='<option value="">Selecione...</option>'+equipamentos.map(e=>`<option value="${e.id}">${e.nome} (${e.qtd_disponivel} disp.)</option>`).join("");

async function registrarMov(){
  const tipo=document.getElementById("movTipo").value;
  const eqId=parseInt(document.getElementById("movEq").value);
  const projId=parseInt(document.getElementById("movProj").value);
  const qtd=parseInt(document.getElementById("movQtd").value);
  const resp=document.getElementById("movResp").value.trim();
  const data=document.getElementById("movData").value;
  if(!eqId||!projId||!resp){showMsg("Preencha todos os campos.",true);return;}
  const eq=equipamentos.find(e=>e.id===eqId);
  if(tipo==="saída"&&eq.qtd_disponivel<qtd){showMsg("Quantidade insuficiente!",true);return;}
  const novaQtd=tipo==="saída"?eq.qtd_disponivel-qtd:Math.min(eq.qtd_total,eq.qtd_disponivel+qtd);
  await sb.from("movimentacoes").insert({tipo,equipamento_id:eqId,projeto_id:projId,quantidade:qtd,responsavel:resp,data,criado_por:usuario.id});
  await sb.from("equipamentos").update({qtd_disponivel:novaQtd}).eq("id",eqId);
  await carregarEquipamentos();renderMetrics();renderEquipamentos();renderGerenciarEquipamentos();preencherSelects();renderHistorico();
  showMsg(tipo==="saída"?"Saída registrada!":"Entrada registrada!");
}

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  ["estoque","gerenciar","projetos","freelancers","movimentar","historico","admin"].forEach(t=>{
    document.getElementById("tab-"+t).style.display=t===nome?"block":"none";
  });
  if(nome==="historico")renderHistorico();
  if(nome==="admin")carregarUsuarios();
}
function showMsg(txt,erro=false){
  const el=document.getElementById("appMsg");
  el.innerHTML=`<div class="${erro?"err":"ok"}">${txt}</div>`;
  setTimeout(()=>el.innerHTML="",3000);
}
</script>
