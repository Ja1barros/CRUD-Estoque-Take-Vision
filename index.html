<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Take Vision Imagem</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{display:none;min-height:100vh}
.auth{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.auth-card{background:#fff;border-radius:16px;border:0.5px solid #e0e0d8;padding:2rem;width:100%;max-width:400px}
.auth-title{font-size:22px;font-weight:500;margin-bottom:6px}
.auth-sub{font-size:14px;color:#666;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:#666;margin-bottom:4px}
input,select{width:100%;border:0.5px solid #d0d0c8;border-radius:8px;padding:8px 12px;font-size:14px;background:#fff;color:#1a1a1a;outline:none}
input:focus,select:focus{border-color:#888}
.btn{width:100%;border:0.5px solid #d0d0c8;border-radius:8px;padding:9px 18px;font-size:14px;background:#1a1a1a;color:#fff;cursor:pointer;font-weight:500;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-outline{background:transparent;color:#1a1a1a}
.btn-sm{width:auto;padding:5px 14px;font-size:13px}
.btn-danger{background:#e24b4a;border-color:#e24b4a;color:#fff}
.err{background:#fcebeb;color:#a32d2d;border:0.5px solid #f09595;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:12px}
.ok{background:#eaf3de;color:#3b6d11;border:0.5px solid #97c459;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:12px}
header{background:#fff;border-bottom:0.5px solid #e0e0d8;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px}
.header-title{font-size:16px;font-weight:500}
.header-user{font-size:13px;color:#666;display:flex;align-items:center;gap:12px}
.tabs{display:flex;gap:0;border-bottom:0.5px solid #e0e0d8;background:#fff;padding:0 1.5rem}
.tab{padding:12px 18px;font-size:14px;border:none;background:none;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:400}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.content{padding:1.5rem;max-width:900px;margin:0 auto}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.metric{background:#fff;border:0.5px solid #e0e0d8;border-radius:10px;padding:1rem}
.metric-label{font-size:12px;color:#888;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500}
.card{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px}
.card-dashed{border-style:dashed;margin-top:16px}
.row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.col{flex:1;min-width:140px}
.badge{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500}
.badge-ok{background:#eaf3de;color:#3b6d11}
.badge-warn{background:#faeeda;color:#854f0b}
.badge-info{background:#e6f1fb;color:#185fa5}
.badge-gray{background:#f1efe8;color:#5f5e5a}
.badge-danger{background:#fcebeb;color:#a32d2d}
.progress-wrap{background:#f1efe8;border-radius:4px;height:6px;overflow:hidden;margin-top:10px}
.progress-bar{height:100%;border-radius:4px;transition:width .3s}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{border:0.5px solid #d0d0c8;border-radius:8px;padding:5px 12px;font-size:12px;background:transparent;cursor:pointer;color:#1a1a1a}
.filter-btn.active{background:#f1efe8}
.eq-row{display:flex;justify-content:space-between;align-items:flex-start}
.eq-name{font-weight:500;font-size:15px}
.eq-sub{font-size:12px;color:#888;margin-top:2px}
.badges-row{display:flex;gap:6px;align-items:center}
.section-title{font-size:16px;font-weight:500;margin-bottom:14px}
.mov-row{display:flex;justify-content:space-between;align-items:center}
.mov-name{font-weight:500;font-size:14px}
.mov-sub{font-size:12px;color:#888;margin-top:2px}
.empty{color:#888;font-size:14px;padding:2rem 0;text-align:center}
.admin-badge{background:#534ab7;color:#eeedfe;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}.row{flex-direction:column}}
</style>
</head>
<body>

<div class="auth" id="authScreen">
  <div class="auth-card">
    <div class="auth-title">Take Vision Imagem</div>
    <div class="auth-sub" id="authSub">Entre com sua conta</div>
    <div id="authMsg"></div>
    <div class="field" id="nomeField" style="display:none">
      <label>Nome</label>
      <input type="text" id="nomeInput" placeholder="Seu nome"/>
    </div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="emailInput" placeholder="seu@email.com"/>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="senhaInput" placeholder="••••••••"/>
    </div>
    <button class="btn" id="authBtn" onclick="handleAuth()">Entrar</button>
    <div style="text-align:center;margin-top:14px">
      <button onclick="toggleAuthMode()" style="background:none;border:none;color:#888;font-size:13px;cursor:pointer" id="toggleBtn">Não tem conta? Cadastre-se</button>
    </div>
  </div>
</div>

<div class="app" id="appScreen">
  <header>
    <div class="header-title">Take Vision Imagem</div>
    <div class="header-user">
      <span id="userNome"></span>
      <span id="userPapel"></span>
      <button class="btn btn-outline btn-sm" onclick="sair()">Sair</button>
    </div>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="mudarTab('estoque',this)">Estoque</button>
    <button class="tab" onclick="mudarTab('projetos',this)">Projetos</button>
    <button class="tab" onclick="mudarTab('movimentar',this)">Movimentar</button>
    <button class="tab" onclick="mudarTab('historico',this)">Histórico</button>
    <button class="tab" id="tabAdmin" style="display:none" onclick="mudarTab('admin',this)">Usuários</button>
  </div>
  <div class="content">
    <div id="appMsg"></div>

    <!-- ESTOQUE -->
    <div id="tab-estoque">
      <div class="metrics" id="metricsArea"></div>
      <div class="filters" id="filtrosArea"></div>
      <div id="listaEquipamentos"></div>
      <div class="card card-dashed">
        <div class="section-title">Cadastrar equipamento</div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Nome</label><input id="eqNome" placeholder="Ex: Canon R5"/></div>
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Categoria</label>
            <select id="eqCat"></select>
          </div>
          <div style="width:90px"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Qtd</label><input id="eqQtd" type="number" min="1" value="1"/></div>
        </div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Nº de série</label><input id="eqSerie" placeholder="Opcional"/></div>
          <div style="display:flex;align-items:flex-end"><button class="btn btn-sm btn-outline" onclick="cadastrarEq()">+ Cadastrar</button></div>
        </div>
      </div>
      <div class="card card-dashed">
        <div class="section-title">Gerenciar categorias</div>
        <div id="listaCategorias" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px"></div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Nova categoria</label><input id="catNome" placeholder="Ex: Drones"/></div>
          <div style="display:flex;align-items:flex-end"><button class="btn btn-sm btn-outline" onclick="criarCategoria()">+ Adicionar</button></div>
        </div>
      </div>
    </div>

    <!-- PROJETOS -->
    <div id="tab-projetos" style="display:none">
      <div id="listaProjetos"></div>
      <div class="card card-dashed">
        <div class="section-title">Criar projeto</div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Nome do projeto</label><input id="projNome" placeholder="Ex: Clip Musical Março"/></div>
          <div style="display:flex;align-items:flex-end"><button class="btn btn-sm btn-outline" onclick="criarProjeto()">+ Criar</button></div>
        </div>
      </div>
    </div>

    <!-- MOVIMENTAR -->
    <div id="tab-movimentar" style="display:none">
      <div class="card">
        <div class="section-title">Registrar movimentação</div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Tipo</label>
            <select id="movTipo">
              <option value="saída">Saída (retirada)</option>
              <option value="entrada">Entrada (devolução)</option>
            </select>
          </div>
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Equipamento</label>
            <select id="movEq"><option value="">Selecione...</option></select>
          </div>
        </div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Projeto</label>
            <select id="movProj"><option value="">Selecione...</option></select>
          </div>
          <div style="width:90px"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Qtd</label><input id="movQtd" type="number" min="1" value="1"/></div>
        </div>
        <div class="row">
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Responsável</label><input id="movResp" placeholder="Nome do responsável"/></div>
          <div class="col"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">Data</label><input id="movData" type="date"/></div>
        </div>
        <button class="btn btn-sm btn-outline" onclick="registrarMov()">Registrar movimentação</button>
      </div>
    </div>

    <!-- HISTÓRICO -->
    <div id="tab-historico" style="display:none">
      <div id="listaHistorico"></div>
    </div>

    <!-- ADMIN -->
    <div id="tab-admin" style="display:none">
      <div id="listaUsuarios"></div>
    </div>
  </div>
</div>

<script>
const SUPA_URL = "https://wikmeymvknuujbnwmfjx.supabase.co";
const SUPA_KEY = "sb_publishable_5aUMGeFFGjEh5lQWpUDBRA_YtfDyy7T";
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

let usuario = null, perfil = null, equipamentos = [], projetos = [], categorias = [], filtroAtivo = "Todas";

// AUTH
let modoLogin = true;
function toggleAuthMode() {
  modoLogin = !modoLogin;
  document.getElementById("authSub").textContent = modoLogin ? "Entre com sua conta" : "Crie sua conta";
  document.getElementById("authBtn").textContent = modoLogin ? "Entrar" : "Cadastrar";
  document.getElementById("toggleBtn").textContent = modoLogin ? "Não tem conta? Cadastre-se" : "Já tem conta? Entrar";
  document.getElementById("nomeField").style.display = modoLogin ? "none" : "block";
}

async function handleAuth() {
  const email = document.getElementById("emailInput").value.trim();
  const senha = document.getElementById("senhaInput").value;
  const nome = document.getElementById("nomeInput").value.trim();
  const msgEl = document.getElementById("authMsg");
  msgEl.innerHTML = "";
  if (!email || !senha) { msgEl.innerHTML = '<div class="err">Preencha e-mail e senha.</div>'; return; }
  if (modoLogin) {
    const { error } = await sb.auth.signInWithPassword({ email, password: senha });
    if (error) { msgEl.innerHTML = `<div class="err">E-mail ou senha incorretos.</div>`; }
  } else {
    if (!nome) { msgEl.innerHTML = '<div class="err">Informe seu nome.</div>'; return; }
    const { data, error } = await sb.auth.signUp({ email, password: senha });
    if (error) { msgEl.innerHTML = `<div class="err">${error.message}</div>`; return; }
    if (data.user) {
      await sb.from("perfis").update({ nome }).eq("id", data.user.id);
      msgEl.innerHTML = '<div class="ok">Conta criada! Verifique seu e-mail para confirmar.</div>';
    }
  }
}

async function sair() { await sb.auth.signOut(); location.reload(); }

sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    usuario = session.user;
    const { data } = await sb.from("perfis").select("*").eq("id", usuario.id).single();
    perfil = data;
    document.getElementById("authScreen").style.display = "none";
    document.getElementById("appScreen").style.display = "block";
    document.getElementById("userNome").textContent = perfil?.nome || usuario.email;
    if (perfil?.papel === "admin") {
      document.getElementById("userPapel").innerHTML = '<span class="admin-badge">Admin</span>';
      document.getElementById("tabAdmin").style.display = "inline-block";
    }
    document.getElementById("movData").value = new Date().toISOString().split("T")[0];
    await carregarTudo();
  }
});

async function carregarTudo() {
  await Promise.all([carregarEquipamentos(), carregarProjetos(), carregarCategorias()]);
  renderMetrics(); renderEquipamentos(); renderProjetos(); renderHistorico();
  preencherSelects();
  if (perfil?.papel === "admin") carregarUsuarios();
}

async function carregarEquipamentos() {
  const { data } = await sb.from("equipamentos").select("*").order("id");
  equipamentos = data || [];
}

async function carregarProjetos() {
  const { data } = await sb.from("projetos").select("*").order("id");
  projetos = data || [];
}

async function carregarCategorias() {
  const { data } = await sb.from("categorias").select("*").order("nome");
  categorias = data || [];
  renderCategorias();
}

function renderCategorias() {
  const select = document.getElementById("eqCat");
  if (select) select.innerHTML = categorias.map(c => `<option value="${c.nome}">${c.nome}</option>`).join("");
  const lista = document.getElementById("listaCategorias");
  if (lista) lista.innerHTML = categorias.map(c => `
    <div style="display:flex;align-items:center;gap:6px;background:#f1efe8;border-radius:8px;padding:5px 10px">
      <span style="font-size:13px">${c.nome}</span>
      <button onclick="excluirCategoria(${c.id},'${c.nome}')" style="background:none;border:none;color:#a32d2d;cursor:pointer;font-size:15px;line-height:1">×</button>
    </div>`).join("");
  const movCat = document.getElementById("movEq");
  if (movCat) preencherSelects();
}

async function criarCategoria() {
  const nome = document.getElementById("catNome").value.trim();
  if (!nome) return;
  const { error } = await sb.from("categorias").insert({ nome });
  if (error) { showMsg("Categoria já existe ou erro ao criar.", true); return; }
  document.getElementById("catNome").value = "";
  await carregarCategorias();
  showMsg("Categoria adicionada!");
}

async function excluirCategoria(id, nome) {
  const usada = equipamentos.some(e => e.categoria === nome);
  if (usada) { showMsg(`A categoria "${nome}" está em uso e não pode ser excluída.`, true); return; }
  if (!confirm(`Excluir a categoria "${nome}"?`)) return;
  await sb.from("categorias").delete().eq("id", id);
  await carregarCategorias();
  showMsg("Categoria excluída.");
}

function renderMetrics() {
  const total = equipamentos.reduce((a, e) => a + e.qtd_total, 0);
  const disp = equipamentos.reduce((a, e) => a + e.qtd_disponivel, 0);
  const aloc = total - disp;
  const ativos = projetos.filter(p => p.status === "ativo").length;
  document.getElementById("metricsArea").innerHTML = `
    <div class="metric"><div class="metric-label">Total de itens</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label" style="color:#3b6d11">Disponíveis</div><div class="metric-value" style="color:#3b6d11">${disp}</div></div>
    <div class="metric"><div class="metric-label" style="color:#854f0b">Alocados</div><div class="metric-value" style="color:#854f0b">${aloc}</div></div>
    <div class="metric"><div class="metric-label" style="color:#185fa5">Projetos ativos</div><div class="metric-value" style="color:#185fa5">${ativos}</div></div>`;
}

function renderEquipamentos() {
  const cats = ["Todas", ...new Set(equipamentos.map(e => e.categoria))];
  document.getElementById("filtrosArea").innerHTML = cats.map(c =>
    `<button class="filter-btn${filtroAtivo===c?' active':''}" onclick="setFiltro('${c}')">${c}</button>`).join("");
  const lista = filtroAtivo === "Todas" ? equipamentos : equipamentos.filter(e => e.categoria === filtroAtivo);
  document.getElementById("listaEquipamentos").innerHTML = lista.map(eq => {
    const aloc = eq.qtd_total - eq.qtd_disponivel;
    const pct = Math.round((eq.qtd_disponivel / eq.qtd_total) * 100);
    const cor = eq.qtd_disponivel === 0 ? "#e24b4a" : aloc > 0 ? "#EF9F27" : "#639922";
    return `<div class="card">
      <div class="eq-row">
        <div><div class="eq-name">${eq.nome}</div><div class="eq-sub">${eq.categoria} · Série: ${eq.numero_serie||"—"}</div></div>
        <div class="badges-row">
          <span class="badge badge-ok">${eq.qtd_disponivel} disp.</span>
          ${aloc>0?`<span class="badge badge-warn">${aloc} aloc.</span>`:""}
          ${perfil?.papel==="admin"?`<button class="btn btn-sm btn-danger" style="margin-left:6px" onclick="excluirEq(${eq.id})">Excluir</button>`:""}
        </div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${cor}"></div></div>
    </div>`;}).join("") || '<div class="empty">Nenhum equipamento cadastrado.</div>';
}

function setFiltro(c) { filtroAtivo = c; renderEquipamentos(); }

function renderProjetos() {
  document.getElementById("listaProjetos").innerHTML = projetos.map(p => `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-weight:500;font-size:15px">${p.nome}</div><div style="font-size:12px;color:#888;margin-top:2px">${new Date(p.criado_em).toLocaleDateString("pt-BR")}</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge ${p.status==='ativo'?'badge-info':'badge-gray'}">${p.status}</span>
          ${p.status==='ativo'?`<button class="btn btn-sm btn-outline" onclick="encerrarProjeto(${p.id})">Encerrar</button>`:""}
        </div>
      </div>
    </div>`).join("") || '<div class="empty">Nenhum projeto criado.</div>';
}

async function renderHistorico() {
  const { data } = await sb.from("movimentacoes").select("*, equipamentos(nome), projetos(nome)").order("criado_em", { ascending: false }).limit(50);
  document.getElementById("listaHistorico").innerHTML = (data||[]).map(m => `
    <div class="card">
      <div class="mov-row">
        <div><div class="mov-name">${m.equipamentos?.nome||"—"}</div>
        <div class="mov-sub">${m.projetos?.nome||"—"} · ${m.responsavel} · ${m.data}</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:14px;font-weight:500">x${m.quantidade}</span>
          <span class="badge ${m.tipo==='saída'?'badge-warn':'badge-ok'}">${m.tipo}</span>
        </div>
      </div>
    </div>`).join("") || '<div class="empty">Nenhuma movimentação registrada.</div>';
}

function preencherSelects() {
  const se = document.getElementById("movEq");
  se.innerHTML = '<option value="">Selecione...</option>' + equipamentos.map(e => `<option value="${e.id}">${e.nome} (${e.qtd_disponivel} disp.)</option>`).join("");
  const sp = document.getElementById("movProj");
  sp.innerHTML = '<option value="">Selecione...</option>' + projetos.filter(p=>p.status==="ativo").map(p=>`<option value="${p.id}">${p.nome}</option>`).join("");
}

async function cadastrarEq() {
  const nome = document.getElementById("eqNome").value.trim();
  const cat = document.getElementById("eqCat").value;
  const qtd = parseInt(document.getElementById("eqQtd").value);
  const serie = document.getElementById("eqSerie").value.trim();
  if (!nome) return;
  await sb.from("equipamentos").insert({ nome, categoria: cat, qtd_total: qtd, qtd_disponivel: qtd, numero_serie: serie||null });
  document.getElementById("eqNome").value = ""; document.getElementById("eqSerie").value = ""; document.getElementById("eqQtd").value = 1;
  await carregarEquipamentos(); renderMetrics(); renderEquipamentos(); preencherSelects();
  showMsg("Equipamento cadastrado!");
}

async function excluirEq(id) {
  if (!confirm("Excluir este equipamento?")) return;
  await sb.from("equipamentos").delete().eq("id", id);
  await carregarEquipamentos(); renderMetrics(); renderEquipamentos(); preencherSelects();
  showMsg("Equipamento excluído.");
}

async function criarProjeto() {
  const nome = document.getElementById("projNome").value.trim();
  if (!nome) return;
  await sb.from("projetos").insert({ nome });
  document.getElementById("projNome").value = "";
  await carregarProjetos(); renderProjetos(); preencherSelects();
  showMsg("Projeto criado!");
}

async function encerrarProjeto(id) {
  await sb.from("projetos").update({ status: "encerrado" }).eq("id", id);
  await carregarProjetos(); renderProjetos(); preencherSelects();
  showMsg("Projeto encerrado.");
}

async function registrarMov() {
  const tipo = document.getElementById("movTipo").value;
  const eqId = parseInt(document.getElementById("movEq").value);
  const projId = parseInt(document.getElementById("movProj").value);
  const qtd = parseInt(document.getElementById("movQtd").value);
  const resp = document.getElementById("movResp").value.trim();
  const data = document.getElementById("movData").value;
  if (!eqId || !projId || !resp) { showMsg("Preencha todos os campos.", true); return; }
  const eq = equipamentos.find(e => e.id === eqId);
  if (tipo === "saída" && eq.qtd_disponivel < qtd) { showMsg("Quantidade insuficiente!", true); return; }
  const novaQtd = tipo === "saída" ? eq.qtd_disponivel - qtd : Math.min(eq.qtd_total, eq.qtd_disponivel + qtd);
  await sb.from("movimentacoes").insert({ tipo, equipamento_id: eqId, projeto_id: projId, quantidade: qtd, responsavel: resp, data, criado_por: usuario.id });
  await sb.from("equipamentos").update({ qtd_disponivel: novaQtd }).eq("id", eqId);
  await carregarEquipamentos(); renderMetrics(); renderEquipamentos(); preencherSelects(); renderHistorico();
  showMsg(tipo === "saída" ? "Saída registrada!" : "Entrada registrada!");
}

async function carregarUsuarios() {
  const { data } = await sb.from("perfis").select("*").order("criado_em");
  document.getElementById("listaUsuarios").innerHTML = (data||[]).map(u => `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-weight:500;font-size:15px">${u.nome}</div><div style="font-size:12px;color:#888;margin-top:2px">${u.id}</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge ${u.papel==='admin'?'admin-badge':'badge-gray'}">${u.papel}</span>
          ${u.id!==usuario.id?`<button class="btn btn-sm btn-outline" onclick="alterarPapel('${u.id}','${u.papel}')">${u.papel==='admin'?'Tornar usuário':'Tornar admin'}</button>`:"(você)"}
        </div>
      </div>
    </div>`).join("") || '<div class="empty">Nenhum usuário.</div>';
}

async function alterarPapel(id, papelAtual) {
  const novo = papelAtual === "admin" ? "usuario" : "admin";
  await sb.from("perfis").update({ papel: novo }).eq("id", id);
  carregarUsuarios();
  showMsg("Papel atualizado!");
}

function mudarTab(nome, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  ["estoque","projetos","movimentar","historico","admin"].forEach(t => {
    document.getElementById("tab-"+t).style.display = t===nome?"block":"none";
  });
  if (nome === "historico") renderHistorico();
  if (nome === "admin") carregarUsuarios();
}

function showMsg(txt, erro=false) {
  const el = document.getElementById("appMsg");
  el.innerHTML = `<div class="${erro?'err':'ok'}">${txt}</div>`;
  setTimeout(() => el.innerHTML = "", 3000);
}

// AUTH
let modoLogin = true;
function toggleAuthMode() {
  modoLogin = !modoLogin;
  document.getElementById("authSub").textContent = modoLogin ? "Entre com sua conta" : "Crie sua conta";
  document.getElementById("authBtn").textContent = modoLogin ? "Entrar" : "Cadastrar";
  document.getElementById("toggleBtn").textContent = modoLogin ? "Não tem conta? Cadastre-se" : "Já tem conta? Entrar";
  document.getElementById("nomeField").style.display = modoLogin ? "none" : "block";
}

async function handleAuth() {
  const email = document.getElementById("emailInput").value.trim();
  const senha = document.getElementById("senhaInput").value;
  const nome = document.getElementById("nomeInput").value.trim();
  const msgEl = document.getElementById("authMsg");
  msgEl.innerHTML = "";
  if (!email || !senha) { msgEl.innerHTML = '<div class="err">Preencha e-mail e senha.</div>'; return; }
  if (modoLogin) {
    const { error } = await sb.auth.signInWithPassword({ email, password: senha });
    if (error) { msgEl.innerHTML = `<div class="err">E-mail ou senha incorretos.</div>`; }
  } else {
    if (!nome) { msgEl.innerHTML = '<div class="err">Informe seu nome.</div>'; return; }
    const { data, error } = await sb.auth.signUp({ email, password: senha });
    if (error) { msgEl.innerHTML = `<div class="err">${error.message}</div>`; return; }
    if (data.user) {
      await sb.from("perfis").update({ nome }).eq("id", data.user.id);
      msgEl.innerHTML = '<div class="ok">Conta criada! Verifique seu e-mail para confirmar.</div>';
    }
  }
}

async function sair() { await sb.auth.signOut(); location.reload(); }

sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    usuario = session.user;
    const { data } = await sb.from("perfis").select("*").eq("id", usuario.id).single();
    perfil = data;
    document.getElementById("authScreen").style.display = "none";
    document.getElementById("appScreen").style.display = "block";
    document.getElementById("userNome").textContent = perfil?.nome || usuario.email;
    if (perfil?.papel === "admin") {
      document.getElementById("userPapel").innerHTML = '<span class="admin-badge">Admin</span>';
      document.getElementById("tabAdmin").style.display = "inline-block";
    }
    document.getElementById("movData").value = new Date().toISOString().split("T")[0];
    await carregarTudo();
  }
});

async function carregarTudo() {
  await Promise.all([carregarEquipamentos(), carregarProjetos()]);
  renderMetrics(); renderEquipamentos(); renderProjetos(); renderHistorico();
  preencherSelects();
  if (perfil?.papel === "admin") carregarUsuarios();
}

async function carregarEquipamentos() {
  const { data } = await sb.from("equipamentos").select("*").order("id");
  equipamentos = data || [];
}

async function carregarProjetos() {
  const { data } = await sb.from("projetos").select("*").order("id");
  projetos = data || [];
}

function renderMetrics() {
  const total = equipamentos.reduce((a, e) => a + e.qtd_total, 0);
  const disp = equipamentos.reduce((a, e) => a + e.qtd_disponivel, 0);
  const aloc = total - disp;
  const ativos = projetos.filter(p => p.status === "ativo").length;
  document.getElementById("metricsArea").innerHTML = `
    <div class="metric"><div class="metric-label">Total de itens</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label" style="color:#3b6d11">Disponíveis</div><div class="metric-value" style="color:#3b6d11">${disp}</div></div>
    <div class="metric"><div class="metric-label" style="color:#854f0b">Alocados</div><div class="metric-value" style="color:#854f0b">${aloc}</div></div>
    <div class="metric"><div class="metric-label" style="color:#185fa5">Projetos ativos</div><div class="metric-value" style="color:#185fa5">${ativos}</div></div>`;
}

function renderEquipamentos() {
  const cats = ["Todas", ...new Set(equipamentos.map(e => e.categoria))];
  document.getElementById("filtrosArea").innerHTML = cats.map(c =>
    `<button class="filter-btn${filtroAtivo===c?' active':''}" onclick="setFiltro('${c}')">${c}</button>`).join("");
  const lista = filtroAtivo === "Todas" ? equipamentos : equipamentos.filter(e => e.categoria === filtroAtivo);
  document.getElementById("listaEquipamentos").innerHTML = lista.map(eq => {
    const aloc = eq.qtd_total - eq.qtd_disponivel;
    const pct = Math.round((eq.qtd_disponivel / eq.qtd_total) * 100);
    const cor = eq.qtd_disponivel === 0 ? "#e24b4a" : aloc > 0 ? "#EF9F27" : "#639922";
    return `<div class="card">
      <div class="eq-row">
        <div><div class="eq-name">${eq.nome}</div><div class="eq-sub">${eq.categoria} · Série: ${eq.numero_serie||"—"}</div></div>
        <div class="badges-row">
          <span class="badge badge-ok">${eq.qtd_disponivel} disp.</span>
          ${aloc>0?`<span class="badge badge-warn">${aloc} aloc.</span>`:""}
          ${perfil?.papel==="admin"?`<button class="btn btn-sm btn-danger" style="margin-left:6px" onclick="excluirEq(${eq.id})">Excluir</button>`:""}
        </div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${cor}"></div></div>
    </div>`;}).join("") || '<div class="empty">Nenhum equipamento cadastrado.</div>';
}

function setFiltro(c) { filtroAtivo = c; renderEquipamentos(); }

function renderProjetos() {
  document.getElementById("listaProjetos").innerHTML = projetos.map(p => `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-weight:500;font-size:15px">${p.nome}</div><div style="font-size:12px;color:#888;margin-top:2px">${new Date(p.criado_em).toLocaleDateString("pt-BR")}</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge ${p.status==='ativo'?'badge-info':'badge-gray'}">${p.status}</span>
          ${p.status==='ativo'?`<button class="btn btn-sm btn-outline" onclick="encerrarProjeto(${p.id})">Encerrar</button>`:""}
        </div>
      </div>
    </div>`).join("") || '<div class="empty">Nenhum projeto criado.</div>';
}

async function renderHistorico() {
  const { data } = await sb.from("movimentacoes").select("*, equipamentos(nome), projetos(nome)").order("criado_em", { ascending: false }).limit(50);
  document.getElementById("listaHistorico").innerHTML = (data||[]).map(m => `
    <div class="card">
      <div class="mov-row">
        <div><div class="mov-name">${m.equipamentos?.nome||"—"}</div>
        <div class="mov-sub">${m.projetos?.nome||"—"} · ${m.responsavel} · ${m.data}</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:14px;font-weight:500">x${m.quantidade}</span>
          <span class="badge ${m.tipo==='saída'?'badge-warn':'badge-ok'}">${m.tipo}</span>
        </div>
      </div>
    </div>`).join("") || '<div class="empty">Nenhuma movimentação registrada.</div>';
}

function preencherSelects() {
  const se = document.getElementById("movEq");
  se.innerHTML = '<option value="">Selecione...</option>' + equipamentos.map(e => `<option value="${e.id}">${e.nome} (${e.qtd_disponivel} disp.)</option>`).join("");
  const sp = document.getElementById("movProj");
  sp.innerHTML = '<option value="">Selecione...</option>' + projetos.filter(p=>p.status==="ativo").map(p=>`<option value="${p.id}">${p.nome}</option>`).join("");
}

async function cadastrarEq() {
  const nome = document.getElementById("eqNome").value.trim();
  const cat = document.getElementById("eqCat").value;
  const qtd = parseInt(document.getElementById("eqQtd").value);
  const serie = document.getElementById("eqSerie").value.trim();
  if (!nome) return;
  await sb.from("equipamentos").insert({ nome, categoria: cat, qtd_total: qtd, qtd_disponivel: qtd, numero_serie: serie||null });
  document.getElementById("eqNome").value = ""; document.getElementById("eqSerie").value = ""; document.getElementById("eqQtd").value = 1;
  await carregarEquipamentos(); renderMetrics(); renderEquipamentos(); preencherSelects();
  showMsg("Equipamento cadastrado!");
}

async function excluirEq(id) {
  if (!confirm("Excluir este equipamento?")) return;
  await sb.from("equipamentos").delete().eq("id", id);
  await carregarEquipamentos(); renderMetrics(); renderEquipamentos(); preencherSelects();
  showMsg("Equipamento excluído.");
}

async function criarProjeto() {
  const nome = document.getElementById("projNome").value.trim();
  if (!nome) return;
  await sb.from("projetos").insert({ nome });
  document.getElementById("projNome").value = "";
  await carregarProjetos(); renderProjetos(); preencherSelects();
  showMsg("Projeto criado!");
}

async function encerrarProjeto(id) {
  await sb.from("projetos").update({ status: "encerrado" }).eq("id", id);
  await carregarProjetos(); renderProjetos(); preencherSelects();
  showMsg("Projeto encerrado.");
}

async function registrarMov() {
  const tipo = document.getElementById("movTipo").value;
  const eqId = parseInt(document.getElementById("movEq").value);
  const projId = parseInt(document.getElementById("movProj").value);
  const qtd = parseInt(document.getElementById("movQtd").value);
  const resp = document.getElementById("movResp").value.trim();
  const data = document.getElementById("movData").value;
  if (!eqId || !projId || !resp) { showMsg("Preencha todos os campos.", true); return; }
  const eq = equipamentos.find(e => e.id === eqId);
  if (tipo === "saída" && eq.qtd_disponivel < qtd) { showMsg("Quantidade insuficiente!", true); return; }
  const novaQtd = tipo === "saída" ? eq.qtd_disponivel - qtd : Math.min(eq.qtd_total, eq.qtd_disponivel + qtd);
  await sb.from("movimentacoes").insert({ tipo, equipamento_id: eqId, projeto_id: projId, quantidade: qtd, responsavel: resp, data, criado_por: usuario.id });
  await sb.from("equipamentos").update({ qtd_disponivel: novaQtd }).eq("id", eqId);
  await carregarEquipamentos(); renderMetrics(); renderEquipamentos(); preencherSelects(); renderHistorico();
  showMsg(tipo === "saída" ? "Saída registrada!" : "Entrada registrada!");
}

async function carregarUsuarios() {
  const { data } = await sb.from("perfis").select("*").order("criado_em");
  document.getElementById("listaUsuarios").innerHTML = (data||[]).map(u => `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-weight:500;font-size:15px">${u.nome}</div><div style="font-size:12px;color:#888;margin-top:2px">${u.id}</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge ${u.papel==='admin'?'admin-badge':'badge-gray'}">${u.papel}</span>
          ${u.id!==usuario.id?`<button class="btn btn-sm btn-outline" onclick="alterarPapel('${u.id}','${u.papel}')">${u.papel==='admin'?'Tornar usuário':'Tornar admin'}</button>`:"(você)"}
        </div>
      </div>
    </div>`).join("") || '<div class="empty">Nenhum usuário.</div>';
}

async function alterarPapel(id, papelAtual) {
  const novo = papelAtual === "admin" ? "usuario" : "admin";
  await sb.from("perfis").update({ papel: novo }).eq("id", id);
  carregarUsuarios();
  showMsg("Papel atualizado!");
}

function mudarTab(nome, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  ["estoque","projetos","movimentar","historico","admin"].forEach(t => {
    document.getElementById("tab-"+t).style.display = t===nome?"block":"none";
  });
  if (nome === "historico") renderHistorico();
  if (nome === "admin") carregarUsuarios();
}

function showMsg(txt, erro=false) {
  const el = document.getElementById("appMsg");
  el.innerHTML = `<div class="${erro?'err':'ok'}">${txt}</div>`;
  setTimeout(() => el.innerHTML = "", 3000);
}
</script>
